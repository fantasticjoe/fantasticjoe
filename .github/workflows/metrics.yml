name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  # ======================
  # Job 1: Header metrics
  # Base stats + coding habits
  # ======================
  header:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-header.svg
          config_timezone: Asia/Shanghai
          config_animations: yes
          config_twemoji: yes
          # Base content
          base: header, activity, community, repositories
          # Lines of code
          plugin_lines: yes
          plugin_lines_sections: base
  # ======================
  # Job 2: Isometric calendar
  # 3D commit calendar (full year)
  # ======================
  isocalendar:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-isocalendar.svg
          config_timezone: Asia/Shanghai
          config_animations: yes
          # Only isocalendar
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ======================
  # Job 3: Languages
  # Programming language distribution
  # ======================
  languages:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages.svg
          config_timezone: Asia/Shanghai
          config_animations: yes
          # Only languages
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: "0%"
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

  # ======================
  # Job 4: Follow-up
  # Issue and pull request follow-up
  # ======================
  followup:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-followup.svg
          config_timezone: Asia/Shanghai
          config_animations: yes
          # Only follow-up
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories

  # ======================
  # Job 5: Topics
  # Starred topics in labels mode
  # ======================
  topics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics-topics.svg
          config_timezone: Asia/Shanghai
          config_animations: yes
          # Only topics
          base: ""
          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_limit: 12

  # ======================
  # Job 6: Repositories
  # Pinned repositories
  # ======================
  repositories:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-repositories.svg
          config_timezone: Asia/Shanghai
          config_animations: yes
          # Only repositories
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 2
