name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}

# Serialize runs: concurrent runs race on committing the same SVGs
# (stale file SHA -> "does not match" commit errors)
concurrency:
  group: metrics
  cancel-in-progress: true

# House palette (shared with fantasticjoe.com):
#   light: bg #F8F5EC · ink #212C33 · accent #4F6D5F · border #DADCD6
#   dark:  bg #1C1C1C · ink #E6DED0 · accent #648679 · border #333333
jobs:
  # ======================
  # Languages (light / dark)
  # Most-used languages, bar and dots desaturated to sit
  # quietly inside the warm palette
  # ======================
  languages-light:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages-light.svg
          config_timezone: Asia/Shanghai
          config_animations: no
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: "0%"
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          extras_css: |
            h2, h3 { color: #4F6D5F !important; }
            svg { color: #212C33 !important; }
            .field svg { fill: #6F927E !important; }
            .bar, .language svg { filter: saturate(0.45) !important; }
            [fill="#959da5"] { fill: #8A9199 !important; }

  languages-dark:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages-dark.svg
          config_timezone: Asia/Shanghai
          config_animations: no
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: "0%"
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          extras_css: |
            h2, h3 { color: #648679 !important; }
            svg { color: #E6DED0 !important; }
            .field svg { fill: #648679 !important; }
            .bar, .language svg { filter: saturate(0.40) brightness(0.9) !important; }
            [fill="#959da5"] { fill: rgba(230,222,208,0.5) !important; }
