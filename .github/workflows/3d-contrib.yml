name: 3D contribution
on:
  # Daily, after the contribution graph updates
  schedule: [{cron: "0 2 * * *"}]
  workflow_dispatch:

concurrency:
  group: contrib-3d
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Generates profile-3d-contrib/profile-3d.svg with the house palette;
      # light & dark are embedded in one SVG (prefers-color-scheme)
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: fantasticjoe
          SETTING_JSON: .github/3d-contrib-settings.json
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          git commit -m "chore: update 3d contribution calendar" && git push || echo "no changes"
