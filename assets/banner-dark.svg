<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Joe Zhu — Bioinformatics undergraduate, photographer, Hangzhou China">
  <style>
    .serif { font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; }
    .serif-sc { font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif; }
    .sans { font-family: 'Source Sans 3', -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
  </style>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="999" height="279" rx="20" fill="#1C1C1C" stroke="#333333"/>
  <!-- gallery mat frame -->
  <rect x="14.5" y="14.5" width="971" height="251" rx="14" fill="none" stroke="#333333"/>

  <!-- kicker -->
  <text x="64" y="82" class="sans" font-size="11" letter-spacing="3.2" fill="rgba(230,222,208,0.55)">HANGZHOU · CHINA — 30.25° N, 120.16° E</text>

  <!-- title -->
  <text x="62" y="150" class="serif" font-size="60" font-weight="600" fill="#E6DED0">Joe Zhu</text>

  <!-- accent rule + subtitle -->
  <rect x="64" y="176" width="44" height="2" fill="#648679"/>
  <text x="64" y="207" class="sans" font-size="16" fill="rgba(230,222,208,0.74)">Bioinformatics undergraduate · ZJU-UoE Institute, Zhejiang University</text>
  <text x="64" y="232" class="sans" font-size="13.5" fill="rgba(230,222,208,0.55)">Writing code, taking photographs, staying curious.</text>

  <!-- vertical chinese quote + cube motif -->
  <text x="918" y="46" class="serif-sc" font-size="17" letter-spacing="3" fill="#648679" style="writing-mode: vertical-rl;">保持好奇 · 热爱生活</text>
  <rect x="852" y="228" width="9" height="9" rx="2" fill="rgba(100,134,121,0.35)"/>
  <rect x="866" y="228" width="9" height="9" rx="2" fill="rgba(100,134,121,0.65)"/>
  <rect x="880" y="228" width="9" height="9" rx="2" fill="#648679"/>
</svg>
